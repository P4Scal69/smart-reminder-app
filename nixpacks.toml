[phases.setup]
nixPkgs = ['php82', 'php82Extensions.pdo', 'php82Extensions.pdo_pgsql', 'php82Extensions.mbstring', 'php82Extensions.dom', 'php82Extensions.fileinfo', 'php82Extensions.xml', 'php82Extensions.curl']

[phases.install]
cmds = ['composer install --no-dev --optimize-autoloader']

[start]
cmd = 'php artisan config:cache && php artisan route:cache && php -S 0.0.0.0:$PORT -t public'
